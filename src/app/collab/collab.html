<!-- src/app/collab/collab.html -->
<div class="collab-wrapper">

  <!-- ═══════════ HEADER ═══════════ -->
  <header class="collab-header">
    <div class="header-inner">

      <div class="header-left">
        <button class="toggle-btn" (click)="toggleSidebar()"
                [attr.aria-label]="isSidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="2" y="4"  width="16" height="2" rx="1" fill="currentColor"/>
            <rect x="2" y="9"  width="10" height="2" rx="1" fill="currentColor"/>
            <rect x="2" y="14" width="16" height="2" rx="1" fill="currentColor"/>
          </svg>
        </button>
        <img src="assets/logo-teamwill2.png" alt="Teamwill" class="header-logo">
      </div>

      <div class="header-right">
        <button class="notif-btn" title="Notifications" (click)="toggleNotifications()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notif-dot" *ngIf="hasNotifications"></span>
        </button>

        <div class="header-user"
             [routerLink]="['/collab/SelfProfile', currentUserId]"
             title="My Profile">
          <div class="user-meta">
            <span class="user-name">{{ userName }}</span>
            <span class="user-role-tag">Collaborator</span>
          </div>
          <div class="user-avatar" [title]="userName">
            <img *ngIf="userPhotoUrl" [src]="userPhotoUrl" [alt]="userName" class="user-avatar-img"/>
            <span *ngIf="!userPhotoUrl">{{ userInitials }}</span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- ═══════════ BODY ═══════════ -->
  <div class="collab-body">

    <!-- SIDEBAR -->
    <aside class="collab-sidebar" [class.collapsed]="isSidebarCollapsed">

      <nav class="sidebar-nav">

        <!-- Satisfaction -->
        <a routerLink="/collab/satisfaction" routerLinkActive="active" class="nav-link"
           [title]="isSidebarCollapsed ? 'Satisfaction' : ''">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
                 stroke="currentColor" stroke-width="1.5">
              <circle cx="10" cy="10" r="8"/>
              <path d="M7 11.5s1 2 3 2 3-2 3-2" stroke-linecap="round"/>
              <circle cx="7.5"  cy="8" r="1" fill="currentColor" stroke="none"/>
              <circle cx="12.5" cy="8" r="1" fill="currentColor" stroke="none"/>
            </svg>
          </span>
          <span class="nav-label">Satisfaction</span>
        </a>

        <!-- Surveys -->
        <a routerLink="/collab/surveys" routerLinkActive="active" class="nav-link"
           [title]="isSidebarCollapsed ? 'Surveys' : ''">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <rect x="2" y="2" width="16" height="16" rx="3"
                    stroke="currentColor" stroke-width="1.5"/>
              <path d="M6 7h8M6 10.5h6M6 14h4"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="nav-label">Surveys</span>
          <span class="nav-badge" *ngIf="overviewStats.surveysToAnswer > 0">
            {{ overviewStats.surveysToAnswer }}
          </span>
        </a>

        <!-- Points de suivi ← NOUVEAU -->
<a routerLink="/collab/points" routerLinkActive="active" class="nav-link"
   [title]="isSidebarCollapsed ? 'Points de suivi' : ''">
  <span class="nav-icon">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <rect x="2" y="2" width="16" height="16" rx="3"
            stroke="currentColor" stroke-width="1.5"/>
      <path d="M6 10l2 2 5-5"
            stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </span>
  <span class="nav-label">Points</span>
</a>

        <!-- Badges -->
        <a routerLink="/collab/badges" routerLinkActive="active" class="nav-link"
           [title]="isSidebarCollapsed ? 'Badges' : ''">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M10 2l2 6h6l-5 3.6 1.9 5.8L10 14l-4.9 3.4L7 11.6 2 8h6z"
                    stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="nav-label">Badges</span>
        </a>

        <!-- Dashboard 
        <a routerLink="/collab/dashboardCollab" routerLinkActive="active" class="nav-link"
           [title]="isSidebarCollapsed ? 'Dashboard' : ''">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <rect x="2"  y="2"  width="7" height="8"  rx="1.5" stroke="currentColor" stroke-width="1.5"/>
              <rect x="11" y="2"  width="7" height="5"  rx="1.5" stroke="currentColor" stroke-width="1.5"/>
              <rect x="11" y="9"  width="7" height="9"  rx="1.5" stroke="currentColor" stroke-width="1.5"/>
              <rect x="2"  y="12" width="7" height="6"  rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </span>
          <span class="nav-label">Dashboard</span>
        </a>
-->
        <!-- My Profile -->
        <a [routerLink]="['/collab/SelfProfile', currentUserId]"
           routerLinkActive="active" class="nav-link"
           [title]="isSidebarCollapsed ? 'My Profile' : ''">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
                 stroke="currentColor" stroke-width="1.5">
              <circle cx="10" cy="7" r="3.5"/>
              <path d="M2.5 18a7.5 7.5 0 0 1 15 0"/>
            </svg>
          </span>
          <span class="nav-label">My Profile</span>
        </a>

      </nav>

      <!-- STATS SECTION -->
      <div class="sidebar-stats" *ngIf="!isSidebarCollapsed">
        <p class="stats-label">Overview</p>

        <div class="stat-item">
          <div class="stat-item-left">
            <div class="stat-icon stat-icon--surveys">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <rect x="1" y="1" width="12" height="12" rx="2.5"
                      stroke="currentColor" stroke-width="1.3"/>
                <path d="M3.5 5h7M3.5 7h5M3.5 9h3"
                      stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              </svg>
            </div>
            <span class="stat-item-label">Pending surveys</span>
          </div>
          <span class="stat-item-value" [class.has-value]="overviewStats.surveysToAnswer > 0">
            {{ overviewStats.surveysToAnswer }}
          </span>
        </div>

     

      </div>

      <!-- FOOTER -->
      <div class="sidebar-footer">
        <button class="footer-btn" [title]="isSidebarCollapsed ? 'Settings' : ''">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2
                     M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M11.2 3.4l-1.4 1.4M4.6 11.2l-1.4 1.4"
                  stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <span class="footer-btn-label">Settings</span>
        </button>

        <button class="footer-btn footer-btn--logout" (click)="logout()"
                [title]="isSidebarCollapsed ? 'Logout' : ''">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3"
                  stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <path d="M10.5 10.5L14 8l-3.5-2.5M14 8H6"
                  stroke="currentColor" stroke-width="1.3"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="footer-btn-label">Logout</span>
        </button>
      </div>

    </aside>

    <!-- CONTENT -->
    <main class="collab-content" [class.expanded]="isSidebarCollapsed">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
