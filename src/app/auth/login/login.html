<div class="login-container">
  <div class="login-box">
    <div class="logo">
      <img src="/assets/teamwill-logo.png" alt="Teamwill Consulting Logo" />
    </div>
    
    <h2>Teamwill Consulting</h2>
    <p class="subtitle">HRBP Platform - Secure authentication for HR Business Partners</p>

    <form (ngSubmit)="submit()">
      <div class="input-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <span class="input-icon">✉</span>
          <input
            type="email"
            placeholder="your.email@teamwillgroup.com"
            [(ngModel)]="email"
            name="email"
            required
            [disabled]="isLoading"
          />
        </div>
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input
            type="password"
            placeholder="Enter your password"
            [(ngModel)]="password"
            name="password"
            required
            [disabled]="isLoading"
          />
        </div>
      </div>

      <div class="remember-forgot">
        <label>
          <input 
            type="checkbox" 
            [(ngModel)]="rememberMe" 
            name="rememberMe"
            [disabled]="isLoading"
          />
          Remember me
        </label>
        <a href="#" (click)="handleForgotPassword($event)">Forgot password?</a>
      </div>

      <button type="submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">Sign in</span>
        <span *ngIf="isLoading">
          Signing in
          <span class="loading"></span>
        </span>
      </button>
    </form>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container">
  @for (toast of toasts; track toast.id) {
    <div class="toast" [class]="'toast ' + toast.type + (toast.isExiting ? ' toast-exit' : '')">
      <span class="toast-icon">{{ getToastIcon(toast.type) }}</span>
      <div class="toast-content">
        <p class="toast-title">{{ toast.title }}</p>
        <p class="toast-message">{{ toast.message }}</p>
      </div>
      <button class="toast-close" (click)="removeToast(toast.id)">×</button>
    </div>
  }
</div>
