<div class="dashboard-container">
  <!-- ═══════════ HEADER / FILTRES ═══════════ -->
  <header class="dashboard-header">
    <h1 class="dashboard-title">Dashboard Direction RH</h1>
    
    <div class="filters-row">
      <!-- Filtre Practice -->
      <div class="filter-group">
        <label>Practice</label>
        <select [(ngModel)]="selectedPractice" (change)="onFilterChange()">
          <option value="">Toutes</option>
          <option *ngFor="let p of practiceList" [value]="p.id">{{ p.name }}</option>
        </select>
      </div>

      <!-- Filtre HRBP -->
      <div class="filter-group">
        <label>HRBP</label>
        <select [(ngModel)]="selectedHRBP" (change)="onFilterChange()">
          <option value="">Tous</option>
          <option *ngFor="let h of hrbpList" [value]="h.id">{{ h.name }}</option>
        </select>
      </div>

      <!-- Filtre Mois -->
      <div class="filter-group">
        <label>Mois</label>
        <select [(ngModel)]="selectedMonth" (change)="onFilterChange()">
          <option value="">Tous</option>
          <option *ngFor="let m of monthsList" [value]="m">{{ m }}</option>
        </select>
      </div>

      <!-- Filtre Collaborateur -->
      <div class="filter-group">
        <label>Collaborateur</label>
        <select [(ngModel)]="selectedCollaborateur" (change)="onFilterChange()">
          <option value="">Tous</option>
          <option *ngFor="let c of collaborateursList" [value]="c.id">{{ c.name }}</option>
        </select>
      </div>


    </div>
  </header>

  <!-- ═══════════ KPIs ═══════════ -->
  <div class="kpi-section">
    <div class="kpi-grid">
      <div class="kpi-card olive">
        <div class="kpi-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div class="kpi-content">
          <span class="kpi-label">Total Collaborateurs</span>
          <span class="kpi-value">{{ kpis.totalCollaborateurs }}</span>
          <span class="kpi-trend positive">+12% ce mois</span>
        </div>
        <div class="kpi-decoration"></div>
      </div>

      <div class="kpi-card rose">
        <div class="kpi-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </div>
        <div class="kpi-content">
          <span class="kpi-label">Taux de Réalisation</span>
          <span class="kpi-value">{{ kpis.tauxRealisation }}</span>
          <span class="kpi-trend positive">+5.2% vs mois dernier</span>
        </div>
        <div class="kpi-decoration"></div>
      </div>

      <div class="kpi-card orange">
        <div class="kpi-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>
        <div class="kpi-content">
          <span class="kpi-label">Taux de Criticité</span>
          <span class="kpi-value">{{ kpis.tauxCriticite }}</span>
          <span class="kpi-trend negative">-2.1% amélioration</span>
        </div>
        <div class="kpi-decoration"></div>
      </div>

      <div class="kpi-card gray">
        <div class="kpi-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="9" y1="21" x2="9" y2="9"/>
          </svg>
        </div>
        <div class="kpi-content">
          <span class="kpi-label">Total Points</span>
          <span class="kpi-value">{{ kpis.totalPoints }}</span>
          <span class="kpi-trend neutral">Stable</span>
        </div>
        <div class="kpi-decoration"></div>
      </div>
    </div>
  </div>

  <!-- ═══════════ GRAPHIQUES ═══════════ -->
  <section class="charts-grid">
    
    <!-- Ligne 1: Donuts -->
    <div class="chart-row">
      <div class="chart-card">
        <div id="practiceChart"></div>
      </div>
      <div class="chart-card">
        <div id="statusChart"></div>
      </div>
      <div class="chart-card">
        <div id="criticiteDonutChart"></div> <!-- 🆕 Nouveau -->
      </div>
    </div>

    <!-- Ligne 2: Satisfaction -->
    <div class="chart-row">
      <div class="chart-card wide">
        <div id="satisfactionChart"></div>
      </div>
      <div class="chart-card wide">
        <div id="satisfactionEvolutionChart"></div> <!-- 🆕 Nouveau -->
      </div>
    </div>

    <!-- Ligne 3: Heatmap -->
    <div class="chart-row">
      <div class="chart-card full">
        <div id="heatmapTitlesChart"></div> <!-- 🆕 Nouveau -->
      </div>
    </div>

    <!-- Ligne 4: Évolutions -->
    <div class="chart-row">
      <div class="chart-card wide">
        <div id="evolutionPointsChart"></div>
      </div>
      <div class="chart-card wide">
        <div id="moodChart"></div>
      </div>
    </div>

  </section>
</div>
