<!-- src/app/direction/direction.html -->
<div class="app-wrapper">

  <!-- ═══════════ HEADER ═══════════ -->
  <header class="app-header">
    <div class="header-inner">

      <div class="header-left">
        <button class="toggle-btn" (click)="toggleSidebar()"
                [attr.aria-label]="isSidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="2" y="3.5"  width="14" height="1.8" rx="0.9" fill="currentColor"/>
            <rect x="2" y="8.1"  width="9"  height="1.8" rx="0.9" fill="currentColor"/>
            <rect x="2" y="12.7" width="14" height="1.8" rx="0.9" fill="currentColor"/>
          </svg>
        </button>
        <img src="assets/logo-teamwill2.png" alt="Teamwill" class="header-logo">
      </div>

      <div class="header-right">

        <!-- Notification bell -->
        <button class="notif-btn" title="Notifications" (click)="toggleNotifications()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notif-dot" *ngIf="hasNotifications"></span>
        </button>

        <!-- User section -->
        <div class="header-user"
             [routerLink]="['/direction/SelfProfile', currentUserId]"
             title="My Profile">
          <div class="user-meta">
            <span class="user-name">{{ userName }}</span>
            <span class="user-role-tag">Direction</span>
          </div>
          <div class="user-avatar" [title]="userName">
            <img *ngIf="userPhotoUrl"
                 [src]="userPhotoUrl"
                 [alt]="userName"
                 class="user-avatar-img" />
            <span *ngIf="!userPhotoUrl">{{ userInitials }}</span>
          </div>
        </div>

      </div>
    </div>
  </header>

  <!-- ═══════════ BODY ═══════════ -->
  <div class="app-body">

    <!-- SIDEBAR -->
    <aside class="app-sidebar" [class.collapsed]="isSidebarCollapsed">

      <!-- NAV -->
      <nav class="sidebar-nav">

        <!-- Dashboard -->
        <a routerLink="/direction/dashboardDirection"
           routerLinkActive="active"
           class="nav-link"
           [title]="isSidebarCollapsed ? 'Dashboard' : ''">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <rect x="2"  y="2"  width="7" height="8"  rx="1.5"
                    stroke="currentColor" stroke-width="1.5"/>
              <rect x="11" y="2"  width="7" height="5"  rx="1.5"
                    stroke="currentColor" stroke-width="1.5"/>
              <rect x="11" y="9"  width="7" height="9"  rx="1.5"
                    stroke="currentColor" stroke-width="1.5"/>
              <rect x="2"  y="12" width="7" height="6"  rx="1.5"
                    stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </span>
          <span class="nav-label">Dashboard</span>
        </a>

      </nav>

      <div class="sidebar-spacer"></div>

      <!-- FOOTER -->
      <div class="sidebar-footer">
        <button class="footer-btn" [title]="isSidebarCollapsed ? 'Settings' : ''">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <circle cx="7.5" cy="7.5" r="2" stroke="currentColor" stroke-width="1.3"/>
            <path d="M7.5 1.5v2M7.5 11.5v2M1.5 7.5h2M11.5 7.5h2
                     M3.3 3.3l1.4 1.4M10.3 10.3l1.4 1.4M10.3 3.3l-1.4 1.4M4.7 10.3l-1.4 1.4"
                  stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <span class="footer-label">Settings</span>
        </button>

        <button class="footer-btn footer-btn--logout" (click)="logout()"
                [title]="isSidebarCollapsed ? 'Logout' : ''">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M5.5 2H3a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h2.5"
                  stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <path d="M10 10l3-3-3-3M13 7H6"
                  stroke="currentColor" stroke-width="1.3"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="footer-label">Logout</span>
        </button>
      </div>

    </aside>

    <!-- CONTENT -->
    <main class="app-content" [class.sidebar-collapsed]="isSidebarCollapsed">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
