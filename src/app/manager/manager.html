<div class="manager-wrapper">

  <!-- ═══════════ HEADER ═══════════ -->
  <header class="manager-header">
    <div class="header-inner">

      <div class="header-left">
        <button class="toggle-btn" (click)="toggleSidebar()"
                [attr.aria-label]="isSidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="2" y="4"  width="16" height="2" rx="1" fill="currentColor"/>
            <rect x="2" y="9"  width="10" height="2" rx="1" fill="currentColor"/>
            <rect x="2" y="14" width="16" height="2" rx="1" fill="currentColor"/>
          </svg>
        </button>
        <img src="assets/logo-teamwill2.png" alt="Teamwill" class="header-logo">
      </div>

      <div class="header-right">

        <!-- Notification bell -->
        <button class="notif-btn" title="Notifications" (click)="toggleNotifications()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notif-dot" *ngIf="hasNotifications"></span>
        </button>

        <!-- User section → click goes to SelfProfile -->
        <div class="header-user"
             [routerLink]="['/manager/SelfProfile', currentUserId]"
             title="My Profile">
          <div class="user-meta">
            <span class="user-name">{{ userName }}</span>
            <span class="user-role-tag">Manager</span>
          </div>
          <div class="user-avatar" [title]="userName">
            <img *ngIf="userPhotoUrl" [src]="userPhotoUrl" [alt]="userName" class="user-avatar-img"/>
            <span *ngIf="!userPhotoUrl">{{ userInitials }}</span>
          </div>
        </div>

      </div>
    </div>
  </header>

  <!-- ═══════════ BODY ═══════════ -->
  <div class="manager-body">

    <!-- SIDEBAR -->
    <aside class="manager-sidebar" [class.collapsed]="isSidebarCollapsed">

      <nav class="sidebar-nav">

        <!-- Dans sidebar-nav, après le lien "My Profile" -->
<a routerLink="/manager/equipe"
   routerLinkActive="active"
   class="nav-link"
   [title]="isSidebarCollapsed ? 'Mon Équipe' : ''">
  <span class="nav-icon">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
         stroke="currentColor" stroke-width="1.5">
      <circle cx="7"  cy="7"  r="3"/>
      <circle cx="13" cy="7"  r="3"/>
      <path d="M1 17a6 6 0 0 1 12 0"/>
      <path d="M13 13a6 6 0 0 1 6 4"/>
    </svg>
  </span>
  <span class="nav-label">Team Members</span>
</a>


        <!-- Alerts -->
        <a [routerLink]="['/manager', currentUserId, 'alerts']"
           [queryParams]="{ name: userName }"
           routerLinkActive="active"
           class="nav-link"
           [title]="isSidebarCollapsed ? 'Alerts' : ''">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
                 stroke="currentColor" stroke-width="1.5">
              <path d="M10 2L2 18h16L10 2z"/>
              <line x1="10" y1="7" x2="10" y2="11"/>
              <circle cx="10" cy="14" r="1"/>
            </svg>
          </span>
          <span class="nav-label">Alerts</span>
        </a>

        <!-- Points de suivi ← NOUVEAU -->
<a routerLink="/manager/points" routerLinkActive="active" class="nav-link"
   [title]="isSidebarCollapsed ? 'Points de suivi' : ''">
  <span class="nav-icon">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <rect x="2" y="2" width="16" height="16" rx="3"
            stroke="currentColor" stroke-width="1.5"/>
      <path d="M6 10l2 2 5-5"
            stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </span>
  <span class="nav-label">Points</span>
</a>
        <!-- Surveys -->
        <a routerLink="/manager/surveys/create"
           routerLinkActive="active"
           class="nav-link"
           [title]="isSidebarCollapsed ? 'Surveys' : ''">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <rect x="2" y="2" width="16" height="16" rx="3"
                    stroke="currentColor" stroke-width="1.5"/>
              <path d="M6 7h8M6 10.5h6M6 14h4"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="nav-label">Surveys</span>
        </a>
        <!-- Dashboard 
        <a routerLink="/manager/dashboardManager"
           routerLinkActive="active"
           class="nav-link"
           [title]="isSidebarCollapsed ? 'Dashboard' : ''">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <rect x="2"  y="2"  width="7" height="8"  rx="1.5" stroke="currentColor" stroke-width="1.5"/>
              <rect x="11" y="2"  width="7" height="5"  rx="1.5" stroke="currentColor" stroke-width="1.5"/>
              <rect x="11" y="9"  width="7" height="9"  rx="1.5" stroke="currentColor" stroke-width="1.5"/>
              <rect x="2"  y="12" width="7" height="6"  rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </span>
          <span class="nav-label">Dashboard</span>
        </a> -->

        <!-- My Profile -->
        <a [routerLink]="['/manager/SelfProfile', currentUserId]"
           routerLinkActive="active"
           class="nav-link"
           [title]="isSidebarCollapsed ? 'My Profile' : ''">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
                 stroke="currentColor" stroke-width="1.5">
              <circle cx="10" cy="7" r="3.5"/>
              <path d="M2.5 18a7.5 7.5 0 0 1 15 0"/>
            </svg>
          </span>
          <span class="nav-label">My Profile</span>
        </a>

      </nav>

      <div class="sidebar-spacer"></div>

      <!-- FOOTER -->
      <div class="sidebar-footer">
        <button class="footer-btn" [title]="isSidebarCollapsed ? 'Settings' : ''">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2
                     M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M11.2 3.4l-1.4 1.4M4.6 11.2l-1.4 1.4"
                  stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <span class="footer-btn-label">Settings</span>
        </button>

        <button class="footer-btn footer-btn--logout" (click)="logout()"
                [title]="isSidebarCollapsed ? 'Logout' : ''">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3"
                  stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <path d="M10.5 10.5L14 8l-3.5-2.5M14 8H6"
                  stroke="currentColor" stroke-width="1.3"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="footer-btn-label">Logout</span>
        </button>
      </div>

    </aside>

    <!-- CONTENT -->
    <main class="manager-content" [class.expanded]="isSidebarCollapsed">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
