<div class="modal-overlay" (click)="onClose()">
  <div class="modal-container" (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="modal-header" [class.modal-header--danger]="deleteMode">
      <h2 class="modal-title">{{ modalTitle }}</h2>
      <button class="modal-close" (click)="onClose()" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Loading -->
    <div *ngIf="isLoading" class="modal-loading">
      <div class="spinner"></div>
      <p>Loading project…</p>
    </div>

    <!-- Error -->
    <div *ngIf="hasError" class="alert alert-error">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <span>{{ errorMessage }}</span>
    </div>

    <!-- Delete confirmation -->
    <div *ngIf="deleteMode && !isLoading" class="modal-body">
      <div class="delete-warning">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5">
          <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"></path>
          <line x1="12" y1="9" x2="12" y2="13"></line>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
        <p>Are you sure you want to delete <strong>{{ projectToDeleteName }}</strong>?
           This action cannot be undone.</p>
      </div>
    </div>

    <!-- Create / Edit form -->
    <div *ngIf="!deleteMode && !isLoading" class="modal-body">

      <div class="form-group">
        <label class="form-label" for="project-name">Project Name <span class="required">*</span></label>
        <input id="project-name" type="text" class="form-input"
               placeholder="e.g. Digital Transformation Q3"
               [(ngModel)]="name" [disabled]="isSaving">
      </div>

      <div class="form-group">
        <label class="form-label" for="project-desc">Description</label>
        <textarea id="project-desc" class="form-input form-textarea"
                  placeholder="Brief description of the project…"
                  [(ngModel)]="description" [disabled]="isSaving" rows="3"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="project-start">Start Date</label>
          <input id="project-start" type="date" class="form-input"
                 [(ngModel)]="startDate" [disabled]="isSaving">
        </div>
        <div class="form-group">
          <label class="form-label" for="project-end">End Date</label>
          <input id="project-end" type="date" class="form-input"
                 [(ngModel)]="endDate" [disabled]="isSaving">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="project-status">Status</label>
        <select id="project-status" class="form-input form-select"
                [(ngModel)]="status" [disabled]="isSaving">
          <option *ngFor="let opt of statusOptions" [value]="opt.value">{{ opt.label }}</option>
        </select>
      </div>

    </div>

    <!-- Footer -->
    <div class="modal-footer" *ngIf="!isLoading">
      <button class="btn btn-secondary" (click)="onClose()" [disabled]="isSaving">Cancel</button>
      <button class="btn"
              [class.btn-danger]="deleteMode"
              [class.btn-primary]="!deleteMode"
              (click)="onSubmit()"
              [disabled]="isSaving">
        <span *ngIf="isSaving" class="spinner spinner--sm"></span>
        <span>{{ deleteMode ? 'Delete' : (projectId ? 'Save Changes' : 'Create Project') }}</span>
      </button>
    </div>

  </div>
</div>
