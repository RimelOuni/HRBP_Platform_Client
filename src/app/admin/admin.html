<div class="app-wrapper">

  <!-- ═══════════ HEADER ═══════════ -->
  <header class="app-header">
    <div class="header-inner">

      <div class="header-left">
        <button class="toggle-btn" (click)="toggleSidebar()"
                [attr.aria-label]="isSidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="2" y="3.5"  width="14" height="1.8" rx="0.9" fill="currentColor"/>
            <rect x="2" y="8.1"  width="9"  height="1.8" rx="0.9" fill="currentColor"/>
            <rect x="2" y="12.7" width="14" height="1.8" rx="0.9" fill="currentColor"/>
          </svg>
        </button>
        <img src="assets/logo-teamwill2.png" alt="Teamwill" class="header-logo">
      </div>

      <div class="header-right">

        <!-- Notification bell -->
        <button class="notif-btn" title="Notifications" (click)="toggleNotifications()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notif-dot" *ngIf="hasNotifications"></span>
        </button>

        <!-- User section → click navigates to SelfProfile -->
        <div class="header-user"
             [routerLink]="['/admin/SelfProfile', currentUserId]"
             title="My Profile">
          <div class="user-meta">
            <span class="user-name">{{ userName }}</span>
            <span class="user-role-tag">Admin</span>
          </div>

          <!-- FIX: show photo if available, else initials -->
          <div class="user-avatar" [title]="userName">
            <img *ngIf="userPhotoUrl"
                 [src]="userPhotoUrl"
                 [alt]="userName"
                 class="user-avatar-img" />
            <span *ngIf="!userPhotoUrl">{{ userInitials }}</span>
          </div>
        </div>

      </div>
    </div>
  </header>

  <!-- ═══════════ BODY ═══════════ -->
  <div class="app-body">

    <!-- SIDEBAR -->
    <aside class="app-sidebar" [class.collapsed]="isSidebarCollapsed">

      <!-- NAV -->
      <nav class="sidebar-nav">

        <!-- Users Management -->
        <a routerLink="/admin/UserManagement"
           routerLinkActive="active"
           class="nav-link"
           [title]="isSidebarCollapsed ? 'Users Management' : ''">
          <span class="nav-icon">
            <!-- FIX: explicit 20×20 viewBox, same size as other icons -->
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
                 stroke="currentColor" stroke-width="1.5">
              <path d="M13 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
              <path d="M17 17a5 5 0 0 0-10 0"/>
              <path d="M17 6a3 3 0 1 1-1.5 2.6"/>
              <path d="M19 17a5 5 0 0 0-3-4.6"/>
            </svg>
          </span>
          <span class="nav-label">Users</span>
        </a>


                <!-- ✅ NEW: Employees ID Import -->
        <a routerLink="/admin/employees-import"
           routerLinkActive="active"
           class="nav-link"
           [title]="isSidebarCollapsed ? 'Employees ID' : ''">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
                 stroke="currentColor" stroke-width="1.5">
              <!-- ID card shape -->
              <rect x="2" y="4" width="16" height="12" rx="2"/>
              <!-- Avatar circle -->
              <circle cx="7" cy="9" r="2"/>
              <!-- Name lines -->
              <path d="M11 8h4M11 11h3" stroke-linecap="round"/>
              <!-- Bottom bar suggesting import -->
              <path d="M5 14h3M10 14h2" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="nav-label">Employees ID</span>
        </a>
    

        <!-- Practices -->
        <a routerLink="/admin/practices"
           routerLinkActive="active"
           class="nav-link"
           [title]="isSidebarCollapsed ? 'Practices' : ''">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <rect x="2" y="7" width="16" height="11" rx="2.5"
                    stroke="currentColor" stroke-width="1.5"/>
              <path d="M7 7V5.5A1.5 1.5 0 0 1 8.5 4h3A1.5 1.5 0 0 1 13 5.5V7"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="nav-label">Practices</span>
        </a>

        <!-- Surveys -->
        <a routerLink="/admin/surveys/create"
           routerLinkActive="active"
           class="nav-link"
           [title]="isSidebarCollapsed ? 'Surveys' : ''">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <rect x="2" y="2" width="16" height="16" rx="3"
                    stroke="currentColor" stroke-width="1.5"/>
              <path d="M6 7h8M6 10.5h6M6 14h4"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="nav-label">Surveys</span>
        </a>

        <!-- Dashboard -->
        <a routerLink="/admin/dashboardAdmin"
        routerLinkActive="active"
           class="nav-link"
           [title]="isSidebarCollapsed ? 'Dashboard' : ''">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <rect x="2"  y="2"  width="7" height="8"  rx="1.5"
                    stroke="currentColor" stroke-width="1.5"/>
              <rect x="11" y="2"  width="7" height="5"  rx="1.5"
                    stroke="currentColor" stroke-width="1.5"/>
              <rect x="11" y="9"  width="7" height="9"  rx="1.5"
                    stroke="currentColor" stroke-width="1.5"/>
              <rect x="2"  y="12" width="7" height="6"  rx="1.5"
                    stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </span>
          <span class="nav-label">Dashboard</span>
        </a>

            <!-- My Profile -->
        <a [routerLink]="['/admin/SelfProfile', currentUserId]"
           routerLinkActive="active"
           class="nav-link"
           [title]="isSidebarCollapsed ? 'My Profile' : ''">
          <span class="nav-icon">
            <!-- FIX: outline style, 20×20, consistent with others -->
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
                 stroke="currentColor" stroke-width="1.5">
              <circle cx="10" cy="7" r="3.5"/>
              <path d="M2.5 18a7.5 7.5 0 0 1 15 0"/>
            </svg>
          </span>
          <span class="nav-label">My Profile</span>
        </a>

      </nav>

      <!-- OVERVIEW -->
      <div class="sidebar-section" *ngIf="!isSidebarCollapsed">

        <p class="section-label">Overview</p>

        <div class="stat-row">
          <div class="stat-row-left">
            <span class="stat-icon stat-icon--green">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                <rect x="1" y="4" width="11" height="8" rx="2"
                      stroke="currentColor" stroke-width="1.2"/>
                <path d="M4 4V3a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1v1"
                      stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="stat-row-label">Practices</span>
          </div>
          <span class="stat-row-value">{{ overviewStats.totalPractices }}</span>
        </div>

        <div class="stat-row">
          <div class="stat-row-left">
            <span class="stat-icon stat-icon--violet">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                <circle cx="5" cy="4" r="2" stroke="currentColor" stroke-width="1.2"/>
                <path d="M1 11a4 4 0 0 1 8 0"
                      stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                <circle cx="10" cy="4.5" r="1.6" stroke="currentColor" stroke-width="1.1"/>
                <path d="M10 8.5c1.7.3 2.7 1.4 2.7 2.5H10"
                      stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="stat-row-label">Collaborators</span>
          </div>
          <span class="stat-row-value">{{ overviewStats.totalCollaborators }}</span>
        </div>

      </div>

      <!-- BREAKDOWN -->
      <div class="sidebar-section sidebar-section--grow"
           *ngIf="!isSidebarCollapsed && practiceStats.length > 0">
        <p class="section-label">By Practice</p>
        <div class="breakdown-list">
          <div class="breakdown-item" *ngFor="let stat of practiceStats">
            <div class="breakdown-row">
              <span class="breakdown-name">{{ stat.name }}</span>
              <span class="breakdown-count">{{ stat.collaboratorsCount }}</span>
            </div>
            <div class="breakdown-track">
              <div class="breakdown-fill"
                   [style.width.%]="(stat.collaboratorsCount / (overviewStats.totalCollaborators || 1)) * 100">
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="sidebar-spacer"></div>

      <!-- FOOTER -->
      <div class="sidebar-footer">
        <button class="footer-btn" [title]="isSidebarCollapsed ? 'Settings' : ''">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <circle cx="7.5" cy="7.5" r="2" stroke="currentColor" stroke-width="1.3"/>
            <path d="M7.5 1.5v2M7.5 11.5v2M1.5 7.5h2M11.5 7.5h2
                     M3.3 3.3l1.4 1.4M10.3 10.3l1.4 1.4M10.3 3.3l-1.4 1.4M4.7 10.3l-1.4 1.4"
                  stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <span class="footer-label">Settings</span>
        </button>

        <button class="footer-btn footer-btn--logout" (click)="logout()"
                [title]="isSidebarCollapsed ? 'Logout' : ''">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M5.5 2H3a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h2.5"
                  stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <path d="M10 10l3-3-3-3M13 7H6"
                  stroke="currentColor" stroke-width="1.3"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="footer-label">Logout</span>
        </button>
      </div>

    </aside>

    <!-- CONTENT -->
    <main class="app-content" [class.sidebar-collapsed]="isSidebarCollapsed">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
