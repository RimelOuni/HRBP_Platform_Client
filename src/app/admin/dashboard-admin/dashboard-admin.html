<div class="dashboard-container">

  <!-- ── HEADER ──────────────────────────────────────────── -->
  <div class="dashboard-header">
    <div class="header-left">
      <h1>Dashboard Admin</h1>
      <p class="header-sub">Vue d'ensemble de la plateforme</p>
    </div>
    <div class="loader-wrap" *ngIf="isLoading">
      <div class="loader-inline">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- ── FILTRES ──────────────────────────────────────────── -->
  <div class="filters-bar">
    <div class="filter-item">
      <label>Practice</label>
      <select [(ngModel)]="selectedPractice" (change)="onFilterChange()">
        <option value="">Toutes les practices</option>
        <option *ngFor="let p of practiceList" [value]="p">{{ p }}</option>
      </select>
    </div>
    <div class="filter-item">
      <label>Mois</label>
      <select [(ngModel)]="selectedMonth" (change)="onFilterChange()">
        <option value="">Tous les mois</option>
        <option *ngFor="let m of monthsList" [value]="m">{{ m }}</option>
      </select>
    </div>
    <div class="filter-item">
      <label>Collaborateur</label>
      <select [(ngModel)]="selectedCollaborateur" (change)="onFilterChange()">
        <option value="">Tous les collaborateurs</option>
        <option *ngFor="let c of collaborateursList" [value]="c">{{ c }}</option>
      </select>
    </div>
    <div class="filter-item">
      <label>HRBP</label>
      <select [(ngModel)]="selectedHRBP" (change)="onFilterChange()">
        <option value="">Tous les HRBP</option>
        <option *ngFor="let h of hrbpList" [value]="h">{{ h }}</option>
      </select>
    </div>
    <button class="reset-btn" (click)="resetFilters()">✕ Réinitialiser</button>
  </div>

  <!-- ── KPIs ─────────────────────────────────────────────── -->
  <div class="kpi-section">
    <div class="kpi-grid">
      <div class="kpi-card olive">
        <div class="kpi-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div class="kpi-content">
          <span class="kpi-label">Total Collaborateurs</span>
          <span class="kpi-value">{{ kpis.totalCollaborateurs }}</span>
          <span class="kpi-trend positive">+12% ce mois</span>
        </div>
        <div class="kpi-decoration"></div>
      </div>

      <div class="kpi-card rose">
        <div class="kpi-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </div>
        <div class="kpi-content">
          <span class="kpi-label">Taux de Réalisation</span>
          <span class="kpi-value">{{ kpis.tauxRealisation }}</span>
          <span class="kpi-trend positive">+5.2% vs mois dernier</span>
        </div>
        <div class="kpi-decoration"></div>
      </div>

      <div class="kpi-card orange">
        <div class="kpi-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>
        <div class="kpi-content">
          <span class="kpi-label">Taux de Criticité</span>
          <span class="kpi-value">{{ kpis.tauxCriticite }}</span>
          <span class="kpi-trend negative">-2.1% amélioration</span>
        </div>
        <div class="kpi-decoration"></div>
      </div>

      <div class="kpi-card gray">
        <div class="kpi-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="9" y1="21" x2="9" y2="9"/>
          </svg>
        </div>
        <div class="kpi-content">
          <span class="kpi-label">Total Points</span>
          <span class="kpi-value">{{ kpis.totalPoints }}</span>
          <span class="kpi-trend neutral">Stable</span>
        </div>
        <div class="kpi-decoration"></div>
      </div>
    </div>
  </div>

  <!-- ── CHARTS ────────────────────────────────────────────── -->
  <div class="charts-grid">

    <!-- EXISTANTS -->
    <div class="chart-card">
      <div id="practiceChart"></div>
    </div>

    <div class="chart-card">
      <div id="satisfactionChart"></div>
    </div>

    <!-- 🆕 NOUVEAU -->
    <div class="chart-card">
      <div id="satisfactionEvolutionChart"></div>
    </div>

    <!-- 🆕 NOUVEAU (plus large conseillé) -->
    <div class="chart-card chart-card--full">
      <div id="heatmapTitlesChart"></div>
    </div>

    <!-- 🆕 NOUVEAU -->
    <div class="chart-card">
      <div id="criticiteDonutChart"></div>
    </div>

    <!-- EXISTANTS -->
    <div class="chart-card">
      <div id="moodChart"></div>
    </div>

    <div class="chart-card">
      <div id="evolutionPointsChart"></div>
    </div>

    <div class="chart-card chart-card--full">
      <div id="statusChart"></div>
    </div>

  </div>

</div>
